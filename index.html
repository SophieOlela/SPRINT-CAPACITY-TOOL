<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINT CAPACITY TOOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-900">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-center border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">SPRINT CAPACITY TOOL</h1>
                <p class="text-slate-500 text-sm italic font-medium">Precision planning for predictable delivery</p>
            </div>
            </header>

        <div class="card p-6 mb-8 border-l-8 border-blue-600">
            <h2 class="text-xs font-black uppercase tracking-widest mb-4 text-blue-600">Global Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Average Velocity (Pts)</label>
                    <input type="number" id="globalVelocity" value="23" oninput="updateAll()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-2xl font-black focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Days per Sprint</label>
                    <input type="number" id="daysPerSprint" value="10" oninput="updateAll()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-2xl font-black focus:border-blue-500 outline-none transition">
                </div>
                <div class="flex items-center">
                    <div class="bg-blue-50 px-4 py-2 rounded-lg border border-blue-100">
                        <span class="text-xs font-bold text-blue-400 uppercase block">Ratio</span>
                        <span id="currentRatio" class="text-xl font-black text-blue-700">0</span> <span class="text-blue-700 font-bold text-xs italic uppercase">pts/day</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card p-6 mb-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Team Members</h2>
                <button onclick="addDeveloper()" class="text-blue-600 hover:underline text-xs font-black uppercase">+ Add Member</button>
            </div>
            <div id="devList" class="flex flex-wrap gap-3"></div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-800 uppercase italic tracking-tighter">Sprints History</h2>
            <button onclick="addNewSprint()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl shadow-xl shadow-blue-200 font-black transition transform hover:-translate-y-1">New Sprint</button>
        </div>

        <div id="sprintsContainer" class="space-y-12 mb-20"></div>

        <footer class="mt-20 border-t border-slate-200 py-10 text-center text-xs text-slate-400">
            &copy; 2026 Sprint Capacity Tool - Contact: sophie.olela@adeo.com
        </footer>
    </div>

    <script>
        let appData = {
            velocity: 23,
            days: 10,
            developers: ["Aymeric", "Florent", "Guillaume", "Maxime", "Abderraouf"],
            sprints: []
        };

        function init() {
            const saved = localStorage.getItem('capacitif_v5');
            if (saved) {
                appData = JSON.parse(saved);
                document.getElementById('globalVelocity').value = appData.velocity;
                document.getElementById('daysPerSprint').value = appData.days;
            }
            renderDevs();
            renderSprints();
            updateRatioDisplay();
        }

        function updateAll() {
            appData.velocity = parseFloat(document.getElementById('globalVelocity').value) || 0;
            appData.days = parseFloat(document.getElementById('daysPerSprint').value) || 1;
            updateRatioDisplay();
            renderSprints();
            save();
        }

        function updateRatioDisplay() {
            const ratio = (appData.velocity / (appData.developers.length * appData.days)).toFixed(3);
            document.getElementById('currentRatio').innerText = ratio;
            return ratio;
        }

        function addDeveloper() {
            const name = prompt("Enter developer name:");
            if (name) {
                appData.developers.push(name);
                renderDevs();
                updateAll();
            }
        }

        function removeDev(index) {
            if(confirm("Remove this member from the team list?")) {
                appData.developers.splice(index, 1);
                renderDevs();
                updateAll();
            }
        }

        function addNewSprint() {
            const name = prompt("Enter Sprint Name (e.g. S33):");
            if (!name) return;
            const newSprint = {
                id: Date.now(),
                name: name,
                data: appData.developers.map(dev => ({
                    name: dev,
                    presence: appData.days,
                    isRunner: false,
                    reason: ""
                }))
            };
            appData.sprints.unshift(newSprint);
            renderSprints();
            save();
        }

        function deleteSprint(id) {
            if(confirm("Are you sure you want to delete this sprint? This cannot be undone.")) {
                appData.sprints = appData.sprints.filter(s => s.id !== id);
                renderSprints();
                save();
            }
        }

        function toggleRunner(sprintId, devName) {
            const sprint = appData.sprints.find(s => s.id === sprintId);
            const devData = sprint.data.find(d => d.name === devName);
            devData.isRunner = !devData.isRunner;
            devData.presence = devData.isRunner ? (appData.days / 2) : appData.days;
            devData.reason = devData.isRunner ? "Runner (1 week)" : "";
            renderSprints();
            save();
        }

        function updatePresence(sprintId, devName, value) {
            const sprint = appData.sprints.find(s => s.id === sprintId);
            const devData = sprint.data.find(d => d.name === devName);
            devData.presence = parseFloat(value) || 0;
            renderSprints();
            save();
        }

        function updateReason(sprintId, devName, value) {
            const sprint = appData.sprints.find(s => s.id === sprintId);
            const devData = sprint.data.find(d => d.name === devName);
            devData.reason = value;
            save();
        }

        function renderDevs() {
            const container = document.getElementById('devList');
            container.innerHTML = appData.developers.map((dev, i) => `
                <span class="bg-white border-2 border-slate-100 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-3">
                    ${dev}
                    <button onclick="removeDev(${i})" class="text-slate-300 hover:text-red-500 transition">✕</button>
                </span>
            `).join('');
        }

        function renderSprints() {
            const container = document.getElementById('sprintsContainer');
            if (appData.sprints.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-10 font-medium italic">No sprints calculated yet.</p>';
                return;
            }

            const ratio = appData.velocity / (appData.developers.length * appData.days);
            
            container.innerHTML = appData.sprints.map(sprint => {
                let totalPoints = 0;
                const rows = sprint.data.map(d => {
                    const pts = (d.presence * ratio);
                    totalPoints += pts;
                    return `
                        <tr class="border-b border-slate-50 transition-colors ${d.isRunner ? 'bg-orange-50/40' : ''}">
                            <td class="py-4 px-2">
                                <span class="font-black text-slate-700 block">${d.name}</span>
                                ${d.isRunner ? '<span class="text-[10px] font-black uppercase text-orange-500 tracking-tighter">⚡ Support Week</span>' : ''}
                            </td>
                            <td class="py-4 text-center">
                                <input type="checkbox" ${d.isRunner ? 'checked' : ''} onchange="toggleRunner(${sprint.id}, '${d.name}')" class="w-5 h-5 accent-orange-500 cursor-pointer">
                            </td>
                            <td class="py-4">
                                <input type="number" step="0.5" value="${d.presence}" onchange="updatePresence(${sprint.id}, '${d.name}', this.value)" class="w-20 border-2 border-slate-100 rounded-lg p-2 text-center font-black focus:border-blue-500 outline-none">
                            </td>
                            <td class="py-4 font-black text-2xl text-blue-600 italic tracking-tighter">
                                ${pts.toFixed(2)}
                            </td>
                            <td class="py-4 px-2">
                                <input type="text" placeholder="..." value="${d.reason || ''}" onchange="updateReason(${sprint.id}, '${d.name}', this.value)" class="w-full bg-transparent border-b-2 border-slate-50 focus:border-blue-200 outline-none text-sm font-medium italic py-1 transition">
                            </td>
                        </tr>
                    `;
                }).join('');

                return `
                    <div class="card p-8 border-t-8 border-slate-900 relative">
                        <div class="flex justify-between items-center mb-10">
                            <div>
                                <h3 class="text-4xl font-black text-slate-900 italic uppercase tracking-tighter">${sprint.name}</h3>
                                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mt-1 tracking-[0.2em]">Capacity Plan</p>
                            </div>
                            <div class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-xl shadow-blue-200 text-right">
                                <div class="text-[10px] font-black uppercase tracking-widest text-blue-200 opacity-80">Target Capacity</div>
                                <span class="text-5xl font-black">${totalPoints.toFixed(2)} <span class="text-lg opacity-50 uppercase tracking-normal">pts</span></span>
                            </div>
                        </div>
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-300 text-[11px] font-black uppercase tracking-[0.2em] border-b border-slate-100">
                                    <th class="pb-4 px-2">Dev</th>
                                    <th class="pb-4 text-center">Runner?</th>
                                    <th class="pb-4">Build Days</th>
                                    <th class="pb-4">Charge (Pts)</th>
                                    <th class="pb-4 px-2">Notes</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                        <div class="mt-8 pt-4 flex justify-end">
                            <button onclick="deleteSprint(${sprint.id})" class="text-red-300 hover:text-red-500 text-[11px] font-black uppercase tracking-[0.2em] transition">
                                [ Delete Sprint ]
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function save() { localStorage.setItem('capacitif_v5', JSON.stringify(appData)); }
        
        init();
    </script>
</body>
</html>
